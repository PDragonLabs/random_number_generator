<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID • RNG Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); }
    .result { font-size: 5.5rem; line-height: 1; font-weight: 700; letter-spacing: -6px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="max-w-4xl mx-auto pt-12 px-6">
  <div class="flex justify-between items-center mb-10">
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 bg-gradient-to-br from-violet-500 via-fuchsia-500 to-cyan-500 rounded-3xl flex items-center justify-center text-5xl rotate-12">🎲</div>
      <div>
        <h1 class="text-6xl font-bold title-font tracking-tighter">VOID RNG</h1>
        <p class="text-zinc-400">Random. Beautiful. Powerful.</p>
      </div>
    </div>
    
    <div class="flex gap-3">
      <button onclick="switchTheme()" class="px-5 py-3 glass rounded-3xl text-sm font-medium">🎨 Theme</button>
      <button onclick="exportCSV()" class="px-5 py-3 glass rounded-3xl text-sm font-medium">↓ Export</button>
    </div>
  </div>

  <div class="glass rounded-3xl p-10 shadow-2xl">
    <!-- RESULT -->
    <div id="result" class="result text-center min-h-[200px] flex items-center justify-center text-violet-300 font-mono">
      Press Generate
    </div>

    <!-- Controls -->
    <div class="grid grid-cols-2 gap-8 mt-8">
      <div>
        <label class="block text-zinc-400 text-sm mb-2">MIN</label>
        <input id="min" type="number" value="1" class="w-full bg-zinc-900 border border-white/10 rounded-3xl px-6 py-5 text-3xl focus:outline-none focus:border-violet-500">
      </div>
      <div>
        <label class="block text-zinc-400 text-sm mb-2">MAX</label>
        <input id="max" type="number" value="100" class="w-full bg-zinc-900 border border-white/10 rounded-3xl px-6 py-5 text-3xl focus:outline-none focus:border-violet-500">
      </div>
    </div>

    <div class="flex gap-4 mt-8">
      <button onclick="generate()" class="flex-1 bg-gradient-to-r from-violet-600 to-fuchsia-600 py-7 rounded-3xl text-2xl font-bold hover:scale-105 transition-all flex items-center justify-center gap-4">
        <i class="fa-solid fa-dice-five"></i>
        <span>GENERATE</span>
      </button>
      <button onclick="copyResult()" class="px-10 py-7 glass rounded-3xl hover:bg-white/10 transition-all">
        <i class="fa-solid fa-copy text-3xl"></i>
      </button>
    </div>

    <!-- Presets -->
    <div class="mt-8 flex flex-wrap gap-3">
      <button onclick="setPreset(1,10)" class="px-5 py-2 text-sm glass rounded-3xl hover:bg-white/10">1–10</button>
      <button onclick="setPreset(1,100)" class="px-5 py-2 text-sm glass rounded-3xl hover:bg-white/10">1–100</button>
      <button onclick="setPreset(0,255)" class="px-5 py-2 text-sm glass rounded-3xl hover:bg-white/10">0–255</button>
      <button onclick="setPreset(1,1000)" class="px-5 py-2 text-sm glass rounded-3xl hover:bg-white/10">1–1000</button>
    </div>

    <!-- Tabs -->
    <div class="mt-12 border-t border-white/10 pt-8">
      <div class="flex border-b border-white/10 mb-6">
        <button onclick="switchTab(0)" class="tab-btn active px-8 py-4 font-medium">Standard</button>
        <button onclick="switchTab(1)" class="tab-btn px-8 py-4 font-medium">Dice Roller</button>
        <button onclick="switchTab(2)" class="tab-btn px-8 py-4 font-medium">Lottery</button>
      </div>

      <!-- Dice Roller -->
      <div id="dicePanel" class="hidden">
        <div class="flex justify-between items-center mb-4">
          <label class="text-zinc-400">Number of Dice</label>
          <input id="diceCount" type="range" min="1" max="10" value="5" oninput="this.nextElementSibling.value = this.value" class="w-48">
          <output class="font-mono">5</output>
        </div>
        <button onclick="rollDice()" class="w-full py-6 bg-gradient-to-r from-amber-500 to-orange-500 rounded-3xl text-xl font-bold">🎲 ROLL DICE</button>
        <div id="diceResult" class="mt-6 text-5xl text-center font-mono min-h-[80px]"></div>
      </div>

      <!-- Lottery -->
      <div id="lotteryPanel" class="hidden">
        <div class="grid grid-cols-3 gap-4">
          <button onclick="lotteryPick('powerball')" class="py-6 glass rounded-3xl">Powerball</button>
          <button onclick="lotteryPick('mega')" class="py-6 glass rounded-3xl">Mega Millions</button>
          <button onclick="lotteryPick('euro')" class="py-6 glass rounded-3xl">EuroMillions</button>
        </div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="mt-10">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold">History</h3>
      <button onclick="clearHistory()" class="text-red-400 text-sm">Clear</button>
    </div>
    <div id="history" class="glass rounded-3xl p-6 max-h-80 overflow-y-auto font-mono text-lg space-y-3"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
  let currentTab = 0;
  let history = [];

  function generate(useCrypto = true) {
    const min = parseFloat(document.getElementById('min').value) || 0;
    const max = parseFloat(document.getElementById('max').value) || 100;
    
    let num;
    if (useCrypto && window.crypto) {
      const array = new Uint32Array(1);
      crypto.getRandomValues(array);
      num = Math.floor((array[0] / 0xffffffff) * (max - min + 1)) + min;
    } else {
      num = Math.floor(Math.random() * (max - min + 1)) + min;
    }

    document.getElementById('result').textContent = num;
    addToHistory(num);
    playSound();
    if (num > 777) confettiBurst();
  }

  function rollDice() {
    const count = parseInt(document.getElementById('diceCount').value);
    let total = 0;
    let diceStr = [];
    
    for (let i = 0; i < count; i++) {
      const roll = Math.floor(Math.random() * 6) + 1;
      total += roll;
      diceStr.push(`<span class="inline-block w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-2xl mx-1">${roll}</span>`);
    }
    
    document.getElementById('diceResult').innerHTML = diceStr.join('') + `<div class="text-4xl mt-4">Total: ${total}</div>`;
    addToHistory(`Dice (${count}) = ${total}`);
    playSound(800);
  }

  function lotteryPick(type) {
    let nums = [];
    if (type === 'powerball') {
      for (let i = 0; i < 5; i++) nums.push(Math.floor(Math.random()*69)+1);
      nums.push(`PB:${Math.floor(Math.random()*26)+1}`);
    } else if (type === 'mega') {
      for (let i = 0; i < 5; i++) nums.push(Math.floor(Math.random()*70)+1);
      nums.push(`Mega:${Math.floor(Math.random()*25)+1}`);
    } else {
      for (let i = 0; i < 5; i++) nums.push(Math.floor(Math.random()*50)+1);
      nums.push(`Lucky:${Math.floor(Math.random()*12)+1}`);
    }
    
    const str = nums.join(' • ');
    document.getElementById('result').innerHTML = `<span class="text-4xl">${str}</span>`;
    addToHistory(str);
    confettiBurst();
    playSound(600);
  }

  function setPreset(min, max) {
    document.getElementById('min').value = min;
    document.getElementById('max').value = max;
    generate();
  }

  function addToHistory(value) {
    history.unshift({value, time: new Date().toLocaleTimeString()});
    if (history.length > 20) history.pop();
    
    const html = history.map(h => `
      <div class="flex justify-between py-2 border-b border-white/10 last:border-none">
        <span>${h.value}</span>
        <span class="text-zinc-500 text-sm">${h.time}</span>
      </div>
    `).join('');
    document.getElementById('history').innerHTML = html;
  }

  function copyResult() {
    const text = document.getElementById('result').textContent;
    if (text) navigator.clipboard.writeText(text);
    playSound(400);
  }

  function exportCSV() {
    if (history.length === 0) return alert("No history yet!");
    let csv = "Number,Time\n";
    history.forEach(h => csv += `"${h.value}","${h.time}"\n`);
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'void-rng-history.csv';
    a.click();
  }

  function clearHistory() {
    history = [];
    document.getElementById('history').innerHTML = '';
  }

  function playSound(freq = 600) {
    try {
      const audio = new AudioContext();
      const osc = audio.createOscillator();
      osc.frequency.value = freq;
      osc.connect(audio.destination);
      osc.start();
      setTimeout(() => osc.stop(), 60);
    } catch(e) {}
  }

  function confettiBurst() {
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', i === tab);
    });
    document.getElementById('dicePanel').classList.toggle('hidden', tab !== 1);
    document.getElementById('lotteryPanel').classList.toggle('hidden', tab !== 2);
  }

  function switchTheme() {
    const colors = ['violet', 'cyan', 'emerald', 'rose'];
    const current = document.documentElement.style.getPropertyValue('--accent') || 'violet';
    const next = colors[(colors.indexOf(current) + 1) % colors.length];
    document.documentElement.style.setProperty('--accent', next);
    document.getElementById('result').classList.add(`text-${next}-300`);
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') generate();
  });

  // Init
  window.onload = () => {
    switchTab(0);
    setTimeout(() => generate(), 400);
  };
</script>
</body>
</html>
